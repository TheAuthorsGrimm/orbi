services:
  - type: web
    name: orbi-backend
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile=false
    startCommand: pnpm --filter @orbi/backend start
    envVars:
      # ── Required ──────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false                       # Neon Postgres connection string
      - key: JWT_SECRET
        generateValue: true               # Render auto-generates a secure value
      - key: WEB_URL
        value: https://grimmforged.ca
      - key: RUN_MIGRATIONS_ON_BOOT
        value: "true"

      # ── Optional (features degrade gracefully without these) ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_AGENT
        sync: false
      - key: STRIPE_PRICE_FULL
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
